name: CI

on:
  push:

jobs:
  backend:
    name: Backend (ruff, mypy, import contracts, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -e ".[dev]"

      - run: ruff check .
      - run: mypy --strict src
      - run: lint-imports
      - run: pytest -m "not integration"

  backend-integration:
    name: Backend (integration, Testcontainers PostGIS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -e ".[dev]"

      - run: pytest -m integration

  frontend:
    name: Frontend (lint, vitest, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Vite 8 (rolldown) requires Node >= 20.19; pin the major used locally.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Lint the full history instead of the pushed range: range-from-event
      # breaks when a root commit is force-pushed, and full history stays
      # cheap at this repo's scale.
      - run: |
          npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
          ROOT=$(git rev-list --max-parents=0 HEAD)
          git log -1 --format=%B "$ROOT" | npx commitlint --verbose
          if [ "$(git rev-list --count HEAD)" -gt 1 ]; then
            npx commitlint --from "$ROOT" --to HEAD --verbose
          fi
