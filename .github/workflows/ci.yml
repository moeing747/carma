name: CI

on:
  push:

jobs:
  backend:
    name: Backend (ruff, mypy, import contracts, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -e ".[dev]"

      - run: ruff check .
      - run: mypy --strict src
      - run: lint-imports
      - run: pytest

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Vite 8 (rolldown) requires Node >= 20.19; pin the major used locally.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # commitlint lints the whole pushed range, not just the tip commit.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
