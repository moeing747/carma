apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carma

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: carma

resources:
  - namespace.yaml
  - configmap.yaml
  - postgis.yaml
  - kafka.yaml
  - migrate-job.yaml
  - api.yaml
  - poller.yaml
  - consumer.yaml
  - projector.yaml

# All backend workloads run the same image with different commands, exactly
# like the compose file. Retag here (or via `kustomize edit set image`) when
# pushing to a registry instead of `kind load`-ing a local build.
images:
  - name: carma-backend
    newTag: dev
