# Position projector; see poller.yaml for why the workers carry no probes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: projector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: projector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projector
    spec:
      containers:
        - name: projector
          image: carma-backend
          command: [carma-project-positions]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: carma-db
                  key: DATABASE_URL
            - name: CARMA_PROJECTION_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: carma-config
                  key: CARMA_PROJECTION_INTERVAL_SECONDS
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
