# Template for the one secret the stack needs. NOT part of the kustomization:
# copy it, fill in real values, and apply it yourself (or use
# `kubectl create secret generic carma-db ...` as shown in the README).
# Never commit a filled-in copy.
apiVersion: v1
kind: Secret
metadata:
  name: carma-db
  namespace: carma
type: Opaque
stringData:
  POSTGRES_USER: change-me
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: carma
  # Must agree with the three values above; 'postgis' is the Service name.
  DATABASE_URL: postgres://change-me:change-me@postgis:5432/carma
