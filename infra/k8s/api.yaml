apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: carma-backend
          # No command: the image's gunicorn CMD serves the Flask app.
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: carma-config
                  key: KAFKA_BROKERS
            - name: CARMA_OPTIMIZER
              valueFrom:
                configMapKeyRef:
                  name: carma-config
                  key: CARMA_OPTIMIZER
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: carma-db
                  key: DATABASE_URL
          # Mirrors the compose healthcheck: GET /health is liveness only and
          # stays 200 while the feed is stale (see the endpoint docstring).
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
