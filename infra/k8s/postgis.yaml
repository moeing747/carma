# Demo-grade single-replica PostGIS with one PVC. A real deployment would use
# a managed Postgres or an operator (CloudNativePG, Zalando) for backups,
# failover, and upgrades; none of that is modeled here.
apiVersion: v1
kind: Service
metadata:
  name: postgis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgis
  ports:
    - name: postgres
      port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgis
spec:
  serviceName: postgis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgis
    spec:
      containers:
        - name: postgis
          image: postgis/postgis:16-3.4
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: carma-db
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carma-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: carma-db
                  key: POSTGRES_DB
            # Subdirectory keeps initdb happy when the PVC root contains
            # lost+found (typical on freshly provisioned volumes).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # Mirrors the compose healthcheck (pg_isready, 10s interval).
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
